<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>voidx — profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background -->
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <canvas id="particles"></canvas>
  </div>

  <!-- Cursor -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursorFollower"></div>

  <!-- Main card -->
  <main class="card" id="card">

    <!-- Top strip: views + status -->
    <div class="card-topbar">
      <span class="views" id="viewCount">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span id="vNum">0</span> views
      </span>
      <span class="status-pill">
        <span class="status-dot"></span>
        online
      </span>
    </div>

    <!-- Banner -->
    <div class="banner">
      <div class="banner-noise"></div>
      <div class="banner-gradient"></div>
    </div>

    <!-- Avatar area -->
    <div class="avatar-row">
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <img
          class="avatar"
          src="https://api.dicebear.com/9.x/lorelei/svg?seed=voidx&backgroundColor=0f0f14"
          alt="avatar"
        />
        <div class="avatar-glow"></div>
      </div>
      <div class="badges">
        <div class="badge" data-tip="Discord Nitro">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </div>
        <div class="badge" data-tip="Early Supporter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#f0a500"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
        </div>
        <div class="badge" data-tip="Hypesquad">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#eb459e"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
      </div>
    </div>

    <!-- Name + tag -->
    <div class="identity">
      <h1 class="username">voidx<span class="tag">#0001</span></h1>
      <p class="display-name">void 👻</p>
    </div>

    <!-- Description -->
    <p class="bio">
      just a guy who lives in the void ✦ building stuff that probably breaks ✦ vibing at 3am
    </p>

    <!-- Location -->
    <div class="location">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      somewhere on the internet • UTC−5
    </div>

    <!-- Divider -->
    <div class="divider">
      <span>socials</span>
    </div>

    <!-- Social links -->
    <div class="socials">

      <a class="social-btn discord" href="#" data-label="Discord">
        <span class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </span>
        <span class="social-text">voidx</span>
        <span class="social-arrow">↗</span>
      </a>

      <a class="social-btn telegram" href="#" data-label="Telegram">
        <span class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.012 9.484c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.875.737z"/></svg>
        </span>
        <span class="social-text">@voidx</span>
        <span class="social-arrow">↗</span>
      </a>

      <a class="social-btn youtube" href="#" data-label="YouTube">
        <span class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </span>
        <span class="social-text">voidxclips</span>
        <span class="social-arrow">↗</span>
      </a>

      <a class="social-btn twitch" href="#" data-label="Twitch">
        <span class="social-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
        </span>
        <span class="social-text">voidxlive</span>
        <span class="social-arrow">↗</span>
      </a>

    </div>

    <!-- Activity / now playing placeholder -->
    <div class="activity-bar" id="activityBar">
      <div class="activity-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16 10,8" fill="currentColor" stroke="none"/></svg>
      </div>
      <div class="activity-info">
        <span class="activity-label">listening to</span>
        <span class="activity-track">tv girl — taking what's not yours</span>
      </div>
      <div class="activity-bars">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <!-- Footer -->
    <div class="card-footer">
      <span>made with <span class="heart">♥</span> by voidx</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
