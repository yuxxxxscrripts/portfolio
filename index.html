<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>exampleuser</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-image"></div>
  <div class="bg-vignette"></div>
  <canvas id="particles-canvas"></canvas>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <main class="page">
    <div class="card" id="card">

      <div class="card-top-bar"></div>

      <!-- Avatar -->
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <img class="avatar-img" src="https://api.dicebear.com/9.x/lorelei/svg?seed=cool&backgroundColor=1a1a2e" alt="pfp" />
        <div class="status-dot"></div>
      </div>

      <!-- Name -->
      <div class="name-group">
        <h1 class="name">exampleuser
          <span class="verified-badge" title="Verified">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </h1>
        <p class="handle">@exampleuser <span class="tag">#0001</span></p>
      </div>

      <!-- Bio -->
      <p class="bio" id="bioEl">&nbsp;</p>

      <!-- Meta -->
      <div class="meta">
        <span class="meta-pill">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          Earth, Milky Way
        </span>
        <span class="meta-pill">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Since 2021
        </span>
      </div>

      <!-- Badges -->
      <div class="badges">
        <span class="badge">🌙 night owl</span>
        <span class="badge">🎵 music</span>
        <span class="badge">💻 dev</span>
        <span class="badge">🌐 global</span>
      </div>

      <div class="divider"></div>

      <!-- Socials -->
      <div class="socials">

        <a href="#" class="social-row discord">
          <div class="s-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.012.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">Discord</span>
            <span class="s-sub">exampleuser#0001</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <a href="#" class="social-row telegram">
          <div class="s-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">Telegram</span>
            <span class="s-sub">@exampleuser</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <a href="#" class="social-row youtube">
          <div class="s-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">YouTube</span>
            <span class="s-sub">youtube.com/@exampleuser</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <a href="#" class="social-row twitch">
          <div class="s-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">Twitch</span>
            <span class="s-sub">twitch.tv/exampleuser</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

      </div>

      <div class="divider"></div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat">
          <div class="stat-n" data-val="2847">0</div>
          <div class="stat-l">followers</div>
        </div>
        <div class="stat-line"></div>
        <div class="stat">
          <div class="stat-n" data-val="312">0</div>
          <div class="stat-l">following</div>
        </div>
        <div class="stat-line"></div>
        <div class="stat">
          <div class="stat-n" data-val="69">0</div>
          <div class="stat-l">projects</div>
        </div>
      </div>

    </div>
  </main>

  <!-- Music pill -->
  <div class="player" id="player">
    <audio id="audio" src="music.mp3" loop preload="auto"></audio>
    <button class="play-btn" id="playBtn" aria-label="Play music">
      <svg id="ico-play" width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="ico-pause" width="12" height="12" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="eq-bars" id="eqBars">
      <i></i><i></i><i></i><i></i><i></i>
    </div>
    <span class="track-name">music.mp3</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
