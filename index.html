<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabkoss</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── Splash / click-to-enter ─────────────────────────── -->
  <div id="splash">
    <div class="splash-line"></div>
    <p class="splash-click">click to enter</p>
    <p class="splash-text">gabkoss.lol</p>
    <div class="splash-line"></div>
  </div>

  <div class="bg-image"></div>
  <div class="bg-vignette"></div>
  <canvas id="particles-canvas"></canvas>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-dot" id="cursorDot"></div>

  <main class="page">
    <div class="card" id="card">

      <div class="card-top-bar"></div>

      <!-- Avatar -->
      <div class="avatar-wrap">
        <div class="avatar-ring"></div>
        <img class="avatar-img" src="pfp.png" alt="pfp" />
        <div class="status-dot"></div>
      </div>

      <!-- Name -->
      <div class="name-group">
        <h1 class="name">Gabkoss
          <span class="verified-badge" title="Verified">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </h1>
        <p class="handle">yuxxgrahh</p>
      </div>

      <!-- Bio -->
      <p class="bio" id="bioEl">&nbsp;</p>

      <!-- Badges -->
      <div class="badges">
        <span class="badge">night owl</span>
        <span class="badge">music</span>
        <span class="badge">dev</span>
        <span class="badge">global</span>
      </div>

      <div class="divider"></div>

      <!-- ── Shop CTA ──────────────────────────────────────── -->
      <div class="shop-wrap">
        <a href="https://astrexalts.sellhub.cx/" target="_blank" rel="noopener" class="shop-btn">
          <div class="shop-shine"></div>
          <div class="shop-icon">
            <!-- shopping bag icon -->
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </div>
          <div class="shop-text">
            <span class="shop-label">astrex shop</span>
            <span class="shop-sublabel">premium · cheap · trusted</span>
          </div>
          <svg class="shop-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <!-- Product pills -->
        <div class="shop-products">
          <span class="sp-pill">
            <!-- creeper icon -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="2" y="2" width="20" height="20" rx="3"/><rect x="8" y="8" width="3" height="3" fill="#080808"/><rect x="13" y="8" width="3" height="3" fill="#080808"/><rect x="9" y="13" width="6" height="2" fill="#080808"/><rect x="9" y="15" width="2" height="2" fill="#080808"/><rect x="13" y="15" width="2" height="2" fill="#080808"/></svg>
            mc alts
          </span>
          <span class="sp-pill">
            <!-- donut -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
            donutsmp money
          </span>
          <span class="sp-pill">
            <!-- diamond/spawner -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 19 9 12 22 5 9"/></svg>
            spawners
          </span>
          <span class="sp-pill">
            <!-- wings/elytra -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12C8 6 2 5 2 10c0 4 4 5 6 4"/><path d="M12 12c4-6 10-7 10-2 0 4-4 5-6 4"/></svg>
            elytras
          </span>
          <span class="sp-pill">
            <!-- N for Netflix -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M5 3v18l6-9 2 6 5-6v9h1V3h-1L12 12 7 3z"/></svg>
            netflix
          </span>
          <span class="sp-pill">
            <!-- music note for Spotify -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 11.5c2.5-1 5.5-.8 8 .5M8 14c2.5-1 5.5-.8 8 .5M8 16.5c2.5-1 5.5-.8 8 .5"/></svg>
            spotify
          </span>
          <span class="sp-pill">
            <!-- plus sign for more -->
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            & more
          </span>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Socials -->
      <div class="socials">

        <!-- Location row (no year) -->
        <a href="https://www.google.com/maps/place/Debrecen,+Hungary" target="_blank" rel="noopener" class="social-row location-row">
          <div class="s-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
              <circle cx="12" cy="9" r="2.5"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">Debrecen, Hungary</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

        <!-- Discord row -->
        <a href="https://discord.com/users/1403846293373194392" target="_blank" rel="noopener" class="social-row discord">
          <div class="s-icon">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
              <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.012.043.03.056a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/>
            </svg>
          </div>
          <div class="s-text">
            <span class="s-name">Discord</span>
            <span class="s-sub">yuxxgrahh</span>
          </div>
          <svg class="s-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </a>

      </div>

      <div class="divider"></div>

      <!-- Views -->
      <div class="views-block">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span class="views-num" id="viewsNum">—</span>
        <span class="views-lbl">profile views</span>
      </div>

    </div>
  </main>

  <!-- Music pill -->
  <div class="player" id="player">
    <audio id="audio" src="vini-x-belano-shake-dat-official-music-video-vini-128k_8qoJqSo7.mp3" loop preload="auto"></audio>
    <button class="play-btn" id="playBtn" aria-label="Play music">
      <svg id="ico-play"  width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      <svg id="ico-pause" width="11" height="11" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="eq-bars" id="eqBars">
      <i></i><i></i><i></i><i></i><i></i>
    </div>
    <span class="track-name">SHAKE DAT</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
